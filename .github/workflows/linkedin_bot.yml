name: Post Daily GCP Tip to LinkedIn

on:
  schedule:
    # Runs every day at 13:00 UTC (9:00 AM EST)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows you to manually trigger the run for testing

jobs:
  post-tip:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run posting script
      env:
        GEMINI_API_KEY: ${{ secrets::GEMINI_API_KEY }}
        LINKEDIN_ACCESS_TOKEN: ${{ secrets::LINKEDIN_ACCESS_TOKEN }}
        LINKEDIN_AUTHOR_URN: ${{ secrets::LINKEDIN_AUTHOR_URN }}
      run: python post_tip.py
